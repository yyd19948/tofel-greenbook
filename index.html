<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>托福绿宝书 · 英译中测试</title>
<meta name="description" content="托福词汇绿宝书 Word List 英译中在线测试，支持发音、自动判定、错题复习。" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
    min-height: 100vh;
    color: #1f2937;
    padding: 32px 20px;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 32px;
    font-weight: 800;
    color: #1e3a8a;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  header .subtitle {
    color: #475569;
    font-size: 15px;
    line-height: 1.6;
  }
  header .badge {
    display: inline-block;
    background: #dbeafe;
    color: #1e40af;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 10px;
  }

  .features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }
  .feature {
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    text-align: center;
  }
  .feature .icon {
    font-size: 24px;
    margin-bottom: 4px;
  }
  .feature .title {
    font-weight: 700;
    color: #1e3a8a;
    font-size: 14px;
    margin-bottom: 2px;
  }
  .feature .desc {
    color: #64748b;
    font-size: 12px;
  }

  .section-title {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .section-title h2 {
    font-size: 20px;
    color: #1e3a8a;
    font-weight: 700;
  }
  .section-title .info {
    color: #64748b;
    font-size: 13px;
  }

  .clear-btn {
    background: none;
    border: 1px solid #cbd5e1;
    color: #64748b;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    margin-left: 8px;
    font-family: inherit;
  }
  .clear-btn:hover { background: #f1f5f9; color: #dc2626; border-color: #fca5a5; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 18px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border: 2px solid transparent;
  }
  .card.available { cursor: pointer; }
  .card.available:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(59, 130, 246, 0.18);
    border-color: #3b82f6;
  }
  .card.locked {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .card .num {
    font-size: 13px;
    color: #64748b;
    font-weight: 600;
  }
  .card .title {
    font-size: 22px;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: 0.5px;
  }
  .card .meta {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 4px;
  }
  .card .status {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
  }
  .card .status.ready {
    background: #ecfdf5;
    color: #15803d;
  }
  .card .status.soon {
    background: #f1f5f9;
    color: #64748b;
  }
  .card .progress {
    margin-top: 6px;
    height: 4px;
    background: #e2e8f0;
    border-radius: 2px;
    overflow: hidden;
  }
  .card .progress .fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    width: 0%;
  }
  .card .score {
    font-size: 11px;
    color: #6366f1;
    font-weight: 700;
    margin-top: 4px;
  }

  footer {
    text-align: center;
    color: #94a3b8;
    font-size: 12px;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #e2e8f0;
  }
  footer a {
    color: #64748b;
    text-decoration: none;
  }
  footer a:hover { color: #1e3a8a; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📘 托福绿宝书 · 英译中在线测试</h1>
    <p class="subtitle">
      根据《TOEFL 词汇词根联想记忆法（绿宝书）》整理<br />
      输入中文释义自动判定 · 支持单词发音 · 错题自动收集
    </p>
    <span class="badge" id="totalBadge">已上线 List</span>
  </header>

  <section class="features">
    <div class="feature">
      <div class="icon">⌨️</div>
      <div class="title">回车判定</div>
      <div class="desc">输入中文按回车，自动判对错</div>
    </div>
    <div class="feature">
      <div class="icon">🔊</div>
      <div class="title">单词发音</div>
      <div class="desc">美式/英式切换，速度可调</div>
    </div>
    <div class="feature">
      <div class="icon">🧠</div>
      <div class="title">模糊匹配</div>
      <div class="desc">大意正确即算对，不必死记书面释义</div>
    </div>
    <div class="feature">
      <div class="icon">📊</div>
      <div class="title">进度记录</div>
      <div class="desc">本地保存每个 List 的最高分</div>
    </div>
  </section>

  <div class="section-title">
    <h2>Word List 列表</h2>
    <div>
      <span class="info" id="readyInfo">共 48 个 List</span>
      <button class="clear-btn" id="clearBtn" title="清除本地保存的所有学习进度">清除进度</button>
    </div>
  </div>

  <div class="grid" id="listGrid"></div>

  <footer>
    <p>本项目仅供个人学习使用 · 词汇内容来源：《TOEFL 词汇词根联想记忆法》（绿宝书）</p>
    <p style="margin-top:6px;">
      <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
      &nbsp;·&nbsp;
      由 HTML/CSS/JS 纯静态构建，可部署在任意静态托管平台
    </p>
  </footer>
</div>

<script>
const LISTS = [
  { n: 1, file: "list1_test.html", words: 90, ready: true },
  { n: 2, file: "list2_test.html", words: 89, ready: true },
  { n: 3, file: "list3_test.html", words: 91, ready: true },
  { n: 4, file: "list4_test.html", words: 93, ready: true },
  { n: 5, file: "list5_test.html", words: 84, ready: true },
  { n: 6, file: "list6_test.html", words: 81, ready: true },
  { n: 7, file: "list7_test.html", words: 87, ready: true },
  { n: 8, file: "list8_test.html", words: 98, ready: true },
  { n: 9, file: "list9_test.html", words: 85, ready: true },
  { n: 10, file: "list10_test.html", words: 88, ready: true },
  { n: 11, file: "list11_test.html", words: 93, ready: true },
  { n: 12, file: "list12_test.html", words: 92, ready: true },
  { n: 13, file: "list13_test.html", words: 90, ready: true },
  { n: 14, file: "list14_test.html", words: 81, ready: true },
  { n: 15, file: "list15_test.html", words: 88, ready: true },
  { n: 16, file: "list16_test.html", words: 88, ready: true },
  { n: 17, file: "list17_test.html", words: 95, ready: true },
  { n: 18, file: "list18_test.html", words: 95, ready: true },
  { n: 19, file: "list19_test.html", words: 83, ready: true },
  { n: 20, file: "list20_test.html", words: 89, ready: true },
  { n: 21, file: "list21_test.html", words: 83, ready: true },
  { n: 22, file: "list22_test.html", words: 90, ready: true },
  { n: 23, file: "list23_test.html", words: 91, ready: true },
  { n: 24, file: "list24_test.html", words: 97, ready: true },
  { n: 25, file: "list25_test.html", words: 87, ready: true },
  { n: 26, file: "list26_test.html", words: 83, ready: true },
  { n: 27, file: "list27_test.html", words: 91, ready: true },
  { n: 28, file: "list28_test.html", words: 86, ready: true },
  { n: 29, file: "list29_test.html", words: 91, ready: true },
  { n: 30, file: "list30_test.html", words: 89, ready: true },
  { n: 31, file: "list31_test.html", words: 88, ready: true },
  { n: 32, file: "list32_test.html", words: 85, ready: true },
  { n: 33, file: "list33_test.html", words: 84, ready: true },
  { n: 34, file: "list34_test.html", words: 97, ready: true },
  { n: 35, file: "list35_test.html", words: 82, ready: true },
  { n: 36, file: "list36_test.html", words: 91, ready: true },
  { n: 37, file: "list37_test.html", words: 91, ready: true },
  { n: 38, file: "list38_test.html", words: 91, ready: true },
  { n: 39, file: "list39_test.html", words: 89, ready: true },
  { n: 40, file: "list40_test.html", words: 91, ready: true },
  { n: 41, file: "list41_test.html", words: 89, ready: true },
  { n: 42, file: "list42_test.html", words: 94, ready: true },
  { n: 43, file: "list43_test.html", words: 90, ready: true },
  { n: 44, file: "list44_test.html", words: 86, ready: true },
  { n: 45, file: "list45_test.html", words: 87, ready: true },
  { n: 46, file: "list46_test.html", words: 86, ready: true },
  { n: 47, file: "list47_test.html", words: 87, ready: true },
  { n: 48, file: "list48_test.html", words: 87, ready: true },
];

const TOTAL_LISTS = 48;

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem("toefl-progress") || "{}");
  } catch { return {}; }
}

function renderGrid() {
  const grid = document.getElementById("listGrid");
  const progress = loadProgress();
  const readyMap = {};
  LISTS.forEach(l => readyMap[l.n] = l);

  let readyCount = 0;
  let html = "";
  for (let i = 1; i <= TOTAL_LISTS; i++) {
    const meta = readyMap[i];
    const ready = !!meta;
    if (ready) readyCount++;
    const prog = progress[i];
    const score = prog ? prog.score : null;
    const progressPct = score != null ? score : 0;

    if (ready) {
      html += `
        <a class="card available" href="${meta.file}">
          <span class="status ready">可测试</span>
          <span class="num">Word List</span>
          <span class="title">List ${i}</span>
          <span class="meta">${meta.words} 个单词</span>
          ${score != null ? `
            <div class="progress"><div class="fill" style="width:${progressPct}%"></div></div>
            <div class="score">最高分 ${score}%</div>
          ` : ''}
        </a>
      `;
    } else {
      html += `
        <div class="card locked" title="即将上线">
          <span class="status soon">即将</span>
          <span class="num">Word List</span>
          <span class="title">List ${i}</span>
          <span class="meta">敬请期待</span>
        </div>
      `;
    }
  }
  grid.innerHTML = html;

  document.getElementById("readyInfo").textContent =
    `${readyCount} / ${TOTAL_LISTS} 已上线`;
  document.getElementById("totalBadge").textContent =
    `已上线 ${readyCount} 个 List · 共 ${LISTS.reduce((a, b) => a + b.words, 0)} 个单词`;
}

document.addEventListener("DOMContentLoaded", () => {
  renderGrid();

  document.getElementById("clearBtn").addEventListener("click", () => {
    if (confirm("确定要清除所有本地学习进度吗？此操作不可恢复。")) {
      localStorage.removeItem("toefl-progress");
      renderGrid();
    }
  });
});
</script>
</body>
</html>
