  { w: "stratigraphy", p: "[strəˈtɪɡrəfi]", keys: ["地层学","岩石组成","地层","地层研究"], ref: "n. 地层学；地层中的岩石组成" },
  { w: "advance", p: "[ədˈvɑːns]", keys: ["前进","发展","进步","促进","预付","预先"], ref: "v. 前进，向前移动；发展，进步；促进；预付 n. 前进；进展；预付(款) a. 预先的；先头的" },
  { w: "estimate", p: "[ˈestɪmeɪt]", keys: ["评估","估计","估价","评价","看法","估算"], ref: "v. 评估，估计；估价 n. 估计；估价；评价，看法" },
  { w: "impetus", p: "[ˈɪmpɪtəs]", keys: ["促进","推动","刺激","推动力","动力","冲力"], ref: "n. 促进，推动；刺激；推动力" },
  { w: "attend", p: "[əˈtend]", keys: ["出席","参加","照料","看管","专心","注意","陪同"], ref: "v. 出席，参加；照料，看管；专心，注意；陪同" },
  { w: "solar", p: "[ˈsoʊlər]", keys: ["太阳的","日光","太阳能","阳历","太阳"], ref: "a. 太阳的，日光的；(利用)太阳能的" },
  { w: "lodge", p: "[lɑːdʒ]", keys: ["巢穴","旅社","乡间小屋","借宿","提出","寄存"], ref: "n. (海狸等的)巢穴；旅社；乡间小屋 v. 正式提出；租住，借宿；为…提供住宿；寄存" },
  { w: "commentary", p: "[ˈkɑːmənteri]", keys: ["评论","注释","实况报道","现场解说","解说","评述"], ref: "n. 评论，注释；(尤指电视台或电台所作的)实况报道，现场解说" },
  { w: "instruct", p: "[ɪnˈstrʌkt]", keys: ["指示","教授","指导","教导","命令","训示"], ref: "vt. 指示；教授" },
  { w: "gorilla", p: "[ɡəˈrɪlə]", keys: ["大猩猩","猩猩","灵长类"], ref: "n. 大猩猩" },
  { w: "logical", p: "[ˈlɑːdʒɪkl]", keys: ["逻辑的","符合逻辑","合理","有逻辑头脑","合乎逻辑"], ref: "a. 逻辑的；符合逻辑的，合理的；有逻辑头脑的" },
  { w: "incubate", p: "[ˈɪŋkjubeɪt]", keys: ["孵化","培育","潜伏","孵卵","繁殖"], ref: "v. 孵化；培育(细菌等)；(疾病)潜伏" },
  { w: "monster", p: "[ˈmɑːnstər]", keys: ["怪物","庞然大物","恶魔","巨大的","庞大的"], ref: "n. 怪物；庞然大物；恶魔 a. 巨大的，庞大的" },
  { w: "intriguing", p: "[ɪnˈtriːɡɪŋ]", keys: ["引起兴趣","吸引人的","好奇","迷人","有趣"], ref: "a. 引起兴趣(或好奇心)的，吸引人的" },
  { w: "sedimentary", p: "[ˌsedɪˈmentri]", keys: ["沉积的","沉淀性","沉积岩","沉淀","成层"], ref: "a. 沉积的，沉淀性的" },
  { w: "participate", p: "[pɑːrˈtɪsɪpeɪt]", keys: ["参与","参加","加入","共事","卷入"], ref: "vi. 参与，参加" },
  { w: "resemble", p: "[rɪˈzembl]", keys: ["相似","像","相像","类似","酷似"], ref: "vt. 与…相似，像" },
  { w: "mason", p: "[ˈmeɪsn]", keys: ["石匠","泥瓦匠","砖瓦匠","石工","瓦工"], ref: "n. 石匠，泥瓦匠" },
  { w: "nationalism", p: "[ˈnæʃnəlɪzəm]", keys: ["国家主义","民族主义","民族优越感","爱国","国家"], ref: "n. 国家主义；民族主义，民族优越感" },
  { w: "heading", p: "[ˈhedɪŋ]", keys: ["标题","主题","题头","篇名","栏目"], ref: "n. 标题；主题" },
  { w: "unpredictable", p: "[ˌʌnprɪˈdɪktəbl]", keys: ["不可预知","无法预言","难以预测","变幻莫测","出乎意料"], ref: "a. 不可预知的；无法预言的" },
  { w: "preoccupation", p: "[priˌɑːkjuˈpeɪʃn]", keys: ["主要考虑因素","全神贯注","心事","专注","挂念"], ref: "n. 主要考虑因素；全神贯注" }
];

const state = { order: [], idx: 0, correct: 0, wrong: 0, answered: false, wrongList: [] };
const $ = (id) => document.getElementById(id);

const TTS = {
  voices: [], ready: false,
  load() {
    if (!("speechSynthesis" in window)) return;
    const update = () => { this.voices = window.speechSynthesis.getVoices(); this.ready = this.voices.length > 0; };
    update();
    window.speechSynthesis.onvoiceschanged = update;
  },
  pickVoice(lang) {
    if (!this.voices.length) this.voices = window.speechSynthesis.getVoices();
    const exact = this.voices.find(v => v.lang === lang);
    if (exact) return exact;
    const prefix = lang.split("-")[0];
    return this.voices.find(v => v.lang.startsWith(prefix)) || null;
  },
  speak(text) {
    if (!("speechSynthesis" in window)) return;
    try {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      const lang = ($("accentSelect") && $("accentSelect").value) || "en-US";
      const rate = parseFloat(($("rateSelect") && $("rateSelect").value) || "0.9");
      utter.lang = lang;
      utter.rate = rate;
      utter.pitch = 1;
      const voice = this.pickVoice(lang);
      if (voice) utter.voice = voice;
      const btn = $("speakBtn");
      utter.onstart = () => btn && btn.classList.add("speaking");
      utter.onend = () => btn && btn.classList.remove("speaking");
      utter.onerror = () => btn && btn.classList.remove("speaking");
      window.speechSynthesis.speak(utter);
    } catch (e) { console.warn("TTS error:", e); }
  }
};
TTS.load();

function speakCurrent() {
  if (state.idx >= state.order.length) return;
  TTS.speak(WORDS[state.order[state.idx]].w);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return (s || "").trim().toLowerCase().replace(/[\s,，。；;、./\\()（）\[\]【】"'`~!@#$%^&*+=?？!！]/g, "");
}

function isMatch(userInput, keys) {
  const u = normalize(userInput);
  if (!u) return false;
  for (const k of keys) {
    const nk = normalize(k);
    if (!nk) continue;
    if (u.includes(nk) || nk.includes(u)) return true;
  }
  return false;
}

function render() {
  if (state.idx >= state.order.length) return showSummary();
  const item = WORDS[state.order[state.idx]];
  $("wordText").textContent = item.w;
  $("phonetic").textContent = item.p || "";
  $("answerInput").value = "";
  $("answerInput").disabled = false;
  $("answerInput").focus();
  $("feedback").style.display = "none";
  $("reference").style.display = "none";
  $("nextBtn").style.display = "none";
  $("checkBtn").style.display = "";
  $("skipBtn").style.display = "";
  $("progress").textContent = `${state.idx + 1} / ${state.order.length}`;
  $("correctCount").textContent = state.correct;
  $("wrongCount").textContent = state.wrong;
  $("progressFill").style.width = `${(state.idx / state.order.length) * 100}%`;
  state.answered = false;
  if ($("autoSpeak") && $("autoSpeak").checked) setTimeout(speakCurrent, 120);
}

function check() {
  if (state.answered) return next();
  const item = WORDS[state.order[state.idx]];
  const input = $("answerInput").value;
  if (input.trim() === "") return skip();
  const ok = isMatch(input, item.keys);
  state.answered = true;
  $("answerInput").disabled = true;
  if (ok) {
    state.correct++;
    $("feedback").className = "feedback correct";
    $("feedbackStatus").textContent = "✓ 回答正确";
    $("feedbackText").innerHTML = `你的回答：<b>${escapeHtml(input)}</b>`;
  } else {
    state.wrong++;
    state.wrongList.push({ ...item, userAnswer: input });
    $("feedback").className = "feedback wrong";
    $("feedbackStatus").textContent = "✗ 回答错误";
    $("feedbackText").innerHTML = `你的回答：<b>${escapeHtml(input)}</b>`;
  }
  $("feedback").style.display = "block";
  $("reference").style.display = "block";
  $("referenceText").textContent = item.ref;
  $("checkBtn").style.display = "none";
  $("skipBtn").style.display = "none";
  $("nextBtn").style.display = "";
  $("correctCount").textContent = state.correct;
  $("wrongCount").textContent = state.wrong;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function skip() {
  if (state.answered) return next();
  const item = WORDS[state.order[state.idx]];
  state.wrong++;
  state.wrongList.push({ ...item, userAnswer: "(跳过)" });
  state.answered = true;
  $("answerInput").disabled = true;
  $("feedback").className = "feedback skipped";
  $("feedbackStatus").textContent = "⊝ 已跳过";
  $("feedbackText").textContent = "请看下方参考答案。";
  $("feedback").style.display = "block";
  $("reference").style.display = "block";
  $("referenceText").textContent = item.ref;
  $("checkBtn").style.display = "none";
  $("skipBtn").style.display = "none";
  $("nextBtn").style.display = "";
  $("wrongCount").textContent = state.wrong;
}

function next() { state.idx++; render(); }

const LIST_NUMBER = 7;

function saveProgress(score) {
  try {
    const all = JSON.parse(localStorage.getItem("toefl-progress") || "{}");
    const prev = all[LIST_NUMBER] || {};
    const best = Math.max(prev.score || 0, score);
    all[LIST_NUMBER] = { score: best, lastScore: score, lastAt: Date.now(), attempts: (prev.attempts || 0) + 1 };
    localStorage.setItem("toefl-progress", JSON.stringify(all));
  } catch (e) { console.warn("save progress failed:", e); }
}

function showSummary() {
  $("quizCard").style.display = "none";
  $("summary").style.display = "block";
  const total = state.order.length;
  const pct = total === 0 ? 0 : Math.round((state.correct / total) * 100);
  $("finalScore").textContent = pct + "%";
  $("finalScore").style.color = pct >= 80 ? "#16a34a" : pct >= 60 ? "#f59e0b" : "#dc2626";
  $("finalBreakdown").textContent = `共 ${total} 题 · 正确 ${state.correct} · 错误/跳过 ${state.wrong}`;
  $("progressFill").style.width = "100%";
  saveProgress(pct);
  const wl = $("wrongListContainer");
  if (state.wrongList.length === 0) {
    wl.innerHTML = "<div style='color:#16a34a; padding:12px;'>全部答对，太棒了！</div>";
  } else {
    wl.innerHTML = "<div style='font-weight:700; color:#dc2626; margin-bottom:8px;'>需要复习的单词：</div>" +
      state.wrongList.map(it => `
        <div class="wrong-item">
          <span class="w">${it.w}</span>
          <span class="m">${it.ref}</span>
          <div style="color:#94a3b8; font-size:12px; margin-top:2px;">你的回答：${it.userAnswer}</div>
        </div>
      `).join("");
  }
}

function start() {
  state.order = shuffle(WORDS.map((_, i) => i));
  state.idx = 0;
  state.correct = 0;
  state.wrong = 0;
  state.wrongList = [];
  $("summary").style.display = "none";
  $("quizCard").style.display = "block";
  render();
}

document.addEventListener("DOMContentLoaded", () => {
  $("checkBtn").addEventListener("click", check);
  $("skipBtn").addEventListener("click", skip);
  $("nextBtn").addEventListener("click", next);
  $("restartBtn").addEventListener("click", start);
  $("restartBtn2").addEventListener("click", start);
  $("speakBtn").addEventListener("click", speakCurrent);

  let lastEnterAt = 0;
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const now = Date.now();
      if (now - lastEnterAt < 250) return;
      lastEnterAt = now;
      e.preventDefault();
      if (state.answered) { next(); } else { check(); }
    } else if (e.key === "Escape") {
      e.preventDefault();
      if (!state.answered) skip();
    } else if ((e.key === "s" || e.key === "S") && document.activeElement !== $("answerInput")) {
      e.preventDefault();
      speakCurrent();
    }
  });

  start();
});
</script>
