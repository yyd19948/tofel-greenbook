<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);

    color: #1f2937;
    padding: 24px;
    display: flex;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 720px;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1e3a8a;
    margin-bottom: 6px;
  }
  header .subtitle {
    color: #64748b;
    font-size: 14px;
  }
  .stats {
    display: flex;
    justify-content: space-between;
    background: #fff;
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    font-size: 14px;
    color: #475569;
  }
  .stats .item { display: flex; gap: 6px; align-items: baseline; }
  .stats .num { font-size: 20px; font-weight: 700; color: #1e3a8a; }
  .stats .num.correct { color: #16a34a; }
  .stats .num.wrong { color: #dc2626; }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: #e2e8f0;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    width: 0%;
    transition: width 0.3s ease;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    margin-bottom: 16px;
  }
  .word-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .word {
    font-size: 38px;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: 0.5px;
  }
  .speak-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: #eef2ff;
    color: #4338ca;
    font-size: 20px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    padding: 0;
  }
  .speak-btn:hover { background: #c7d2fe; transform: scale(1.05); }
  .speak-btn.speaking { background: #4338ca; color: #fff; }
  .phonetic {
    text-align: center;
    color: #64748b;
    font-size: 16px;
    margin-bottom: 16px;
    font-style: italic;
  }
  .options {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 18px;
    font-size: 13px;
    color: #64748b;
  }
  .options label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .options select {
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 12px;
    background: #fff;
    color: #475569;
    cursor: pointer;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    font-size: 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input[type="text"]:focus { border-color: #3b82f6; }
  input[type="text"]:disabled {
    background: #f8fafc;
    color: #64748b;
  }
  button {
    padding: 12px 20px;
    font-size: 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #e2e8f0; color: #475569; }
  .btn-secondary:hover { background: #cbd5e1; }

  .feedback {
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct {
    background: #ecfdf5;
    color: #065f46;
    border-left: 4px solid #16a34a;
  }
  .feedback.wrong {
    background: #fef2f2;
    color: #991b1b;
    border-left: 4px solid #dc2626;
  }
  .feedback.skipped {
    background: #fffbeb;
    color: #92400e;
    border-left: 4px solid #f59e0b;
  }
  .feedback .status { font-weight: 700; margin-bottom: 4px; }

  .reference {
    background: #eef2ff;
    border-radius: 10px;
    padding: 14px 16px;
    border-left: 4px solid #6366f1;
    font-size: 15px;
    line-height: 1.7;
    display: none;
    color: #1e1b4b;
  }
  .reference .label {
    font-weight: 700;
    color: #4338ca;
    display: block;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .reference #referenceText {
    font-weight: 500;
  }

  .controls {
    display: flex;
    gap: 8px;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
  }
  .controls .left, .controls .right {
    display: flex;
    gap: 8px;
  }

  .summary {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);

  }
  .summary .breakdown {

    margin-bottom: 20px;
  }

    text-align: left;

    overflow-y: auto;
    border-top: 1px solid #e2e8f0;

    text-align: center;
    color: #94a3b8;
    font-size: 12px;
    margin-top: 14px;
  }

    background: #f1f5f9;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: ui-monospace, monospace;
  }
</style>

<div class="container">
  <header>
    <a href="index.html" style="display:inline-block; color:#64748b; text-decoration:none; font-size:13px; margin-bottom:10px;">← 返回首页</a>

  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="card" id="quizCard">
    <div class="word-row">
      <div class="word" id="wordText">-</div>
      <button class="speak-btn" id="speakBtn" title="发音 (快捷键 S)" aria-label="发音">🔊</button>
    </div>
    <div class="phonetic" id="phonetic">-</div>

    <div class="options">
      <label><input type="checkbox" id="autoSpeak" checked /> 自动发音</label>

      <label>语速

          <option value="0.9" selected>正常</option>
          <option value="1.1">快</option>
        </select>
      </label>

      <div id="feedbackText"></div>

    <div class="reference" id="reference">
      <span class="label">参考答案</span>
      <span id="referenceText"></span>
    </div>

    <div class="controls">
      <div class="left">
        <button class="btn-secondary" id="skipBtn">跳过 / 不会</button>
      </div>
      <div class="right">
        <button class="btn-secondary" id="nextBtn" style="display:none;">下一题 →</button>
        <button class="btn-secondary" id="restartBtn">重新开始</button>
      </div>
    </div>

    <div class="tip">
      <kbd>Enter</kbd> 判定 / 下一题 &nbsp;·&nbsp; <kbd>Esc</kbd> 跳过 &nbsp;·&nbsp; <kbd>S</kbd> 发音
    </div>
  </div>

  <div class="summary" id="summary">
    <h2>测试完成 🎉</h2>
    <div class="score" id="finalScore">0%</div>
    <div class="breakdown" id="finalBreakdown"></div>
    <div class="wrong-list" id="wrongListContainer"></div>

  </div>
</div>

];

const state = {
  order: [],
  idx: 0,
  correct: 0,
  wrong: 0,
  answered: false,
  wrongList: []
};

const $ = (id) => document.getElementById(id);

const TTS = {
  voices: [],
  ready: false,
  load() {
    if (!("speechSynthesis" in window)) return;
    const update = () => {
      this.voices = window.speechSynthesis.getVoices();
      this.ready = this.voices.length > 0;
    };
    update();
    window.speechSynthesis.onvoiceschanged = update;
  },
  pickVoice(lang) {
    if (!this.voices.length) this.voices = window.speechSynthesis.getVoices();
    const exact = this.voices.find(v => v.lang === lang);
    if (exact) return exact;
    const prefix = lang.split("-")[0];
    const sameLang = this.voices.find(v => v.lang.startsWith(prefix));
    return sameLang || null;
  },
  speak(text) {
    if (!("speechSynthesis" in window)) return;
    try {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      const lang = ($("accentSelect") && $("accentSelect").value) || "en-US";
      const rate = parseFloat(($("rateSelect") && $("rateSelect").value) || "0.9");
      utter.lang = lang;
      utter.rate = rate;
      utter.pitch = 1;
      const voice = this.pickVoice(lang);
      if (voice) utter.voice = voice;
      const btn = $("speakBtn");
      utter.onstart = () => btn && btn.classList.add("speaking");
      utter.onend = () => btn && btn.classList.remove("speaking");
      utter.onerror = () => btn && btn.classList.remove("speaking");
      window.speechSynthesis.speak(utter);
    } catch (e) {
      console.warn("TTS error:", e);
    }
  }
};
TTS.load();

function speakCurrent() {
  if (state.idx >= state.order.length) return;
  const item = WORDS[state.order[state.idx]];
  TTS.speak(item.w);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return (s || "")
    .trim()
    .toLowerCase()
    .replace(/[\s,，。；;、./\\()（）\[\]【】"'`~!@#$%^&*+=?？!！]/g, "");
}

function isMatch(userInput, keys) {
  const u = normalize(userInput);
  if (!u) return false;
  for (const k of keys) {
    const nk = normalize(k);
    if (!nk) continue;
    if (u.includes(nk) || nk.includes(u)) return true;
  }
  return false;
}

function render() {
  if (state.idx >= state.order.length) return showSummary();

  const item = WORDS[state.order[state.idx]];
  $("wordText").textContent = item.w;
  $("phonetic").textContent = item.p || "";
  $("answerInput").value = "";
  $("answerInput").disabled = false;
  $("answerInput").focus();
  $("feedback").style.display = "none";
  $("reference").style.display = "none";
  $("nextBtn").style.display = "none";
  $("checkBtn").style.display = "";
  $("skipBtn").style.display = "";

  $("progress").textContent = `${state.idx + 1} / ${state.order.length}`;
  $("correctCount").textContent = state.correct;
  $("wrongCount").textContent = state.wrong;
  $("progressFill").style.width = `${(state.idx / state.order.length) * 100}%`;

  state.answered = false;

  if ($("autoSpeak") && $("autoSpeak").checked) {
    setTimeout(speakCurrent, 120);
  }
}

function check() {
  if (state.answered) return next();
  const item = WORDS[state.order[state.idx]];
  const input = $("answerInput").value;
  const ok = isMatch(input, item.keys);

  if (input.trim() === "") {
    return skip();
  }

  state.answered = true;
  $("answerInput").disabled = true;

  if (ok) {
    state.correct++;
    $("feedback").className = "feedback correct";
    $("feedbackStatus").textContent = "✓ 回答正确";
    $("feedbackText").innerHTML = `你的回答：<b>${escapeHtml(input)}</b>`;
  } else {
    state.wrong++;
    state.wrongList.push({ ...item, userAnswer: input });
    $("feedback").className = "feedback wrong";
    $("feedbackStatus").textContent = "✗ 回答错误";
    $("feedbackText").innerHTML = `你的回答：<b>${escapeHtml(input)}</b>`;
  }

  $("feedback").style.display = "block";
  $("reference").style.display = "block";
  $("referenceText").textContent = item.ref;
  $("checkBtn").style.display = "none";
  $("skipBtn").style.display = "none";
  $("nextBtn").style.display = "";
  $("correctCount").textContent = state.correct;
  $("wrongCount").textContent = state.wrong;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function skip() {
  if (state.answered) return next();
  const item = WORDS[state.order[state.idx]];
  state.wrong++;
  state.wrongList.push({ ...item, userAnswer: "(跳过)" });
  state.answered = true;
  $("answerInput").disabled = true;
  $("feedback").className = "feedback skipped";
  $("feedbackStatus").textContent = "⊝ 已跳过";
  $("feedbackText").textContent = "请看下方参考答案。";
  $("feedback").style.display = "block";
  $("reference").style.display = "block";
  $("referenceText").textContent = item.ref;
  $("checkBtn").style.display = "none";
  $("skipBtn").style.display = "none";
  $("nextBtn").style.display = "";
  $("wrongCount").textContent = state.wrong;
}

function next() {
  state.idx++;
  render();
}

const LIST_NUMBER = 18;

function saveProgress(score) {
  try {
    const all = JSON.parse(localStorage.getItem("toefl-progress") || "{}");
    const prev = all[LIST_NUMBER] || {};
    const best = Math.max(prev.score || 0, score);
    all[LIST_NUMBER] = {
      score: best,
      lastScore: score,
      lastAt: Date.now(),
      attempts: (prev.attempts || 0) + 1
    };
    localStorage.setItem("toefl-progress", JSON.stringify(all));
  } catch (e) { console.warn("save progress failed:", e); }
}

function showSummary() {
  $("quizCard").style.display = "none";
  $("summary").style.display = "block";
  const total = state.order.length;
  const pct = total === 0 ? 0 : Math.round((state.correct / total) * 100);
  $("finalScore").textContent = pct + "%";
  $("finalScore").style.color = pct >= 80 ? "#16a34a" : pct >= 60 ? "#f59e0b" : "#dc2626";
  $("finalBreakdown").textContent = `共 ${total} 题 · 正确 ${state.correct} · 错误/跳过 ${state.wrong}`;
  $("progressFill").style.width = "100%";
  saveProgress(pct);

  const wl = $("wrongListContainer");
  if (state.wrongList.length === 0) {
    wl.innerHTML = "<div style='color:#16a34a; padding:12px;'>全部答对，太棒了！</div>";
  } else {
    wl.innerHTML = "<div style='font-weight:700; color:#dc2626; margin-bottom:8px;'>需要复习的单词：</div>" +
      state.wrongList.map(it => `
        <div class="wrong-item">
          <span class="w">${it.w}</span>
          <span class="m">${it.ref}</span>
          <div style="color:#94a3b8; font-size:12px; margin-top:2px;">你的回答：${it.userAnswer}</div>
        </div>
      `).join("");
  }
}

function start() {
  state.order = shuffle(WORDS.map((_, i) => i));
  state.idx = 0;
  state.correct = 0;
  state.wrong = 0;
  state.wrongList = [];
  $("summary").style.display = "none";
  $("quizCard").style.display = "block";
  render();
}

document.addEventListener("DOMContentLoaded", () => {
  $("checkBtn").addEventListener("click", check);
  $("skipBtn").addEventListener("click", skip);
  $("nextBtn").addEventListener("click", next);
  $("restartBtn").addEventListener("click", start);
  $("restartBtn2").addEventListener("click", start);
  $("speakBtn").addEventListener("click", speakCurrent);

  let lastEnterAt = 0;
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const now = Date.now();
      if (now - lastEnterAt < 250) return;
      lastEnterAt = now;
      e.preventDefault();
      if (state.answered) {
        next();
      } else {
        check();
      }
    } else if (e.key === "Escape") {
      e.preventDefault();
      if (!state.answered) skip();
    } else if ((e.key === "s" || e.key === "S") && document.activeElement !== $("answerInput")) {
      e.preventDefault();
      speakCurrent();
    }
  });

  start();
});
</script>
